name = "arcana-proxy"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = true

routes = [
  { pattern = "proxy.arcana.otnelhq.com/v1/*", zone_id = "3c5d5afdbd04d5fda736a13e8008d659" }
]

[[kv_namespaces]]
binding = "ARCANA_PROXY"
id = "8c183296c8a14bd6857b1c896e7e5c3c"

[[analytics_engine_datasets]]
binding = "ARCANA_PROXY_ANALYTICS"
dataset = "arcana_proxy_usage"

[[send_email]]
name = "EMAIL"

# ---------------------------------------------------------------------------
# Staging — sandbox PayPal, workers.dev domain, no production routes
#   npx wrangler deploy --env staging
#   npx wrangler secret put --env staging PAYPAL_CLIENT_ID
#   npx wrangler secret put --env staging PAYPAL_CLIENT_SECRET
# ---------------------------------------------------------------------------
[env.staging]
workers_dev = true

[env.staging.vars]
PAYPAL_SANDBOX = "true"

[[env.staging.kv_namespaces]]
binding = "ARCANA_PROXY"
id = "8c183296c8a14bd6857b1c896e7e5c3c"

[[env.staging.analytics_engine_datasets]]
binding = "ARCANA_PROXY_ANALYTICS"
dataset = "arcana_proxy_usage"

[[env.staging.send_email]]
name = "EMAIL"
